[app]
seen_store = "vercel_blob"
seen_jobs_blob_path = "job-finder/seen_jobs.json"
resume_path = "resume.txt"
top_k = 15
min_score = 0.40
max_jobs_per_source = 40

[profile]
name = "Fiza Afrin"
target_titles = ["QA Automation Engineer", "SDET", "QA Engineer", "Test Automation Engineer", "Software Test Engineer", "API Test Engineer", "Salesforce QA Engineer"]
